<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        var originalFetch = window.fetch;
        var currentFetch = originalFetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return currentFetch; },
            set: function(val) { currentFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine window.fetch:", e);
        }
        try {
          Object.defineProperty(globalThis, 'fetch', {
            get: function() { return currentFetch; },
            set: function(val) { currentFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine globalThis.fetch:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strimy - Agence Marketing</title>
    <!-- Kanit Font Import from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      html, body, #root {
        background-color: #0C0C0C;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
